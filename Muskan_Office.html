<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muskan - Office Stock Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-cream: #F0EAE1; --text-charcoal: #333333; --white: #ffffff; --in-green: #27ae60; --out-red: #e74c3c; --accent: #A67C52; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-cream); color: var(--text-charcoal); margin: 0; padding: 20px; overflow-x: hidden; }
        .container { max-width: 750px; margin: 0 auto; }
        .cloud-bar { background: #333; color: white; padding: 10px 20px; border-radius: 4px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; font-weight: 700; }
        .sync-btn { background: var(--accent); color: white; border: none; padding: 4px 12px; cursor: pointer; border-radius: 3px; font-size: 10px; }
        #settingsDrawer { position: fixed; right: -400px; top: 0; width: 400px; height: 100%; background: white; border-left: 3px solid var(--text-charcoal); box-shadow: -10px 0 30px rgba(0,0,0,0.1); padding: 30px; z-index: 1000; transition: 0.4s; overflow-y: auto; }
        #settingsDrawer.open { right: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 900; }
        .balance-box { background: var(--text-charcoal); color: white; padding: 30px; text-align: center; border-radius: 4px; margin-bottom: 20px; border-bottom: 5px solid var(--accent); position: relative; cursor: pointer; }
        .settings-trigger { position: absolute; top: 15px; right: 15px; cursor: pointer; background: none; border: none; font-size: 20px; color: white; opacity: 0.5; }
        .count { font-size: 60px; font-weight: 800; margin: 5px 0; display: block; transition: filter 0.3s ease; filter: blur(20px); }
        .balance-box:hover .count { filter: blur(0px); }
        .dashboard-box { background: #fff; border: 2px solid #333; margin-bottom: 20px; padding: 15px; border-radius: 4px; }
        .dashboard-title { font-size: 11px; font-weight: 800; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .action-box { background: #fff; padding: 25px; border: 2px solid #333; border-radius: 4px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; margin-bottom: 10px; }
        label { font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; color: #666; }
        input { padding: 10px; border: 2px solid #ddd; font-size: 15px; font-weight: 700; outline: none; }
        input[readonly] { background: #f9f9f9; color: var(--accent); }
        .btn { padding: 18px; border: none; color: white; font-weight: 800; cursor: pointer; text-transform: uppercase; border-radius: 4px; }
        .log-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 10px; border-bottom: 1px solid #ddd; background: #fff; font-size: 14px; }
        .edit-controls { display: none; }
        .editing-active .edit-controls { display: block; }
        .edit-link { color: #3498db; cursor: pointer; font-size: 11px; font-weight: 800; text-decoration: underline; margin-right: 15px; }
        
        /* PRINT STYLES */
        #printModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .print-card { background: white; width: 100%; max-width: 450px; padding: 30px; border-radius: 4px; position: relative; }
        
        @media print {
            @page { size: A5; margin: 0; }
            body { background: white; padding: 0; }
            .container, .overlay, #settingsDrawer, .cloud-bar, .no-print { display: none !important; }
            #printModal { display: block !important; position: absolute; background: white; }
            .print-card { 
                padding-top: 3in !important; /* 3-Inch Letterhead Gap */
                box-shadow: none; border: none; width: 100%; max-width: 100%;
            }
            .print-footer { position: fixed; bottom: 30px; left: 30px; right: 30px; border-top: 1px solid #333; padding-top: 10px; }
        }
    </style>
</head>
<body>

<div id="printModal">
    <div class="print-card" id="printArea">
        <div style="text-align: center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px;">
            <h2 id="pType" style="margin:0; text-transform: uppercase; font-weight: 800;">HOUSE ➔ NTM</h2>
        </div>
        <div style="display: flex; justify-content: space-between; font-size: 16px; margin-bottom: 10px;">
            <span>Challan No: <b id="pChallan"></b></span>
            <span>Date: <b id="pDate"></b></span>
        </div>
        <div style="text-align: center; margin: 40px 0; border: 2px dashed #333; padding: 20px;">
            <span style="font-size: 12px; font-weight: 800;">TOTAL QUANTITY</span><br>
            <span id="pQty" style="font-size: 48px; font-weight: 800;">0</span> <span style="font-size: 20px;">Pcs</span>
        </div>
        <div class="print-footer">
            <small style="font-weight: 800; font-size: 10px;">REMARKS:</small><br>
            <span id="pNote" style="font-style: italic;"></span>
        </div>
        <div class="no-print" style="margin-top: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn" style="background:var(--in-green);" onclick="window.print()">Print Slip</button>
            <button class="btn" style="background:var(--text-charcoal);" onclick="document.getElementById('printModal').style.display='none'">Close</button>
        </div>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closeSettings()"></div>
<div id="settingsDrawer">
    <h2 style="font-family:'Playfair Display'">Admin Control</h2>
    <hr>
    <div class="input-group" style="margin-top:20px"><label>Cloud URL</label><input type="text" id="setCloudUrl"></div>
    <div class="input-group" style="margin-top:15px"><label>Admin Password</label><input type="password" id="setPass"></div>
    <div class="input-group" style="margin-top:15px"><label>Opening Stock</label><input type="number" id="setOpeningStock"></div>
    <p style="font-size: 10px; font-weight: 800; color: var(--accent); margin-top: 25px;">INWARD CONFIG</p>
    <div class="config-grid"><div class="input-group"><label>Prefix</label><input type="text" id="setInPrefix"></div><div class="input-group"><label>Next No.</label><input type="number" id="setInNo"></div></div>
    <p style="font-size: 10px; font-weight: 800; color: var(--out-red); margin-top: 10px;">OUTWARD CONFIG</p>
    <div class="config-grid"><div class="input-group"><label>Prefix</label><input type="text" id="setOutPrefix"></div><div class="input-group"><label>Next No.</label><input type="number" id="setOutNo"></div></div>
    <button class="btn" onclick="saveSettings()" style="background:var(--text-charcoal); width:100%; color:white; margin-top:10px;">Save Configuration</button>
    <button class="recover-btn" onclick="recoverFromCloud()">⚠️ RECOVER FROM CLOUD</button>
</div>

<div class="container">
    <div class="cloud-bar"><span id="syncStatus">☁️ Cloud Status: Ready</span><button class="sync-btn" onclick="syncToCloud()">Sync All Now</button></div>
    <div style="text-align:center; margin-bottom: 20px;"><h1 style="font-family:'Playfair Display'; font-size: 32px; margin:0;">MUSKAN</h1><p style="font-size: 10px; font-weight:800; letter-spacing: 4px; margin:5px 0 0 0;">OFFICE STOCK TRACKER</p></div>
    <div class="balance-box"><button class="settings-trigger" onclick="requestAccess()">⚙️</button><span class="count" id="currentBalance">0</span><h2 style="font-size: 10px; letter-spacing: 2px;">TOTAL PCS (HOVER TO REVEAL)</h2></div>
    <div class="dashboard-box"><div class="dashboard-title"><span>Recent Movements (Last 10)</span><button onclick="toggleEditMode()" id="editBtn" style="font-size: 10px; cursor:pointer; padding: 2px 10px; background:#eee;">Edit Mode</button></div><div id="mainLog"></div></div>
    
    <div class="action-box">
        <div class="input-group"><label>Date</label><input type="date" id="manualDate"></div>
        <div class="input-group"><label>Quantity</label><input type="number" id="pcsInput" placeholder="0"></div>
        <div class="input-group"><label>Challan IN</label><input type="text" id="inwardNo" readonly></div>
        <div class="input-group"><label>Challan OUT</label><input type="text" id="outwardNo" readonly></div>
        
        <div class="input-group" style="grid-column: span 2;">
            <label>Notes / Remarks</label>
            <input type="text" id="officeNote" placeholder="e.g. Sent with auto, Sample lot etc.">
        </div>

        <button class="btn" style="background:var(--in-green); color:white;" onclick="processStock('IN')">HOUSE TO NTM</button>
        <button class="btn" style="background:var(--out-red); color:white;" onclick="processStock('OUT')">NTM TO HOUSE</button>
    </div>
</div>

<script>
    let stockData = JSON.parse(localStorage.getItem('msk_v13_data')) || [];
    let config = JSON.parse(localStorage.getItem('msk_v13_config')) || { inPrefix: "IN-", inNo: 101, outPrefix: "OUT-", outNo: 101, opening: 0, pass: "1234", cloudUrl: "" };
    let isEditing = false;

    function requestAccess() { const p = prompt("Password:"); if (p === config.pass) openSettings(); else if (p !== null) alert("Denied."); }
    function openSettings() {
        document.getElementById('settingsDrawer').classList.add('open'); document.getElementById('overlay').style.display = 'block';
        document.getElementById('setCloudUrl').value = config.cloudUrl; document.getElementById('setPass').value = config.pass;
        document.getElementById('setOpeningStock').value = config.opening; document.getElementById('setInPrefix').value = config.inPrefix;
        document.getElementById('setInNo').value = config.inNo; document.getElementById('setOutPrefix').value = config.outPrefix;
        document.getElementById('setOutNo').value = config.outNo;
    }
    function closeSettings() { document.getElementById('settingsDrawer').classList.remove('open'); document.getElementById('overlay').style.display = 'none'; }
    function saveSettings() {
        config.cloudUrl = document.getElementById('setCloudUrl').value; config.pass = document.getElementById('setPass').value || "1234";
        config.opening = parseInt(document.getElementById('setOpeningStock').value) || 0; config.inPrefix = document.getElementById('setInPrefix').value;
        config.inNo = parseInt(document.getElementById('setInNo').value); config.outPrefix = document.getElementById('setOutPrefix').value;
        config.outNo = parseInt(document.getElementById('setOutNo').value);
        localStorage.setItem('msk_v13_config', JSON.stringify(config)); updateUI(); closeSettings(); syncToCloud();
    }
    
    function updateUI() { document.getElementById('inwardNo').value = config.inPrefix + config.inNo; document.getElementById('outwardNo').value = config.outPrefix + config.outNo; render(); }
    
    function processStock(type) {
        const qty = parseInt(document.getElementById('pcsInput').value); 
        const dateInput = document.getElementById('manualDate').value; 
        const note = document.getElementById('officeNote').value;
        if (!dateInput || !qty) return alert("Fill fields.");
        
        // FIX 1: Clean the date immediately to stop timezone shifting
        const cleanDate = dateInput.split('T')[0];
        
        const challanPrefix = type === 'IN' ? config.inPrefix : config.outPrefix;
        const challanNo = type === 'IN' ? config.inNo : config.outNo;
        const fullChallan = challanPrefix + challanNo;

        stockData.unshift({ id: Date.now(), date: cleanDate, challan: fullChallan, type, qty, note });
        if (type === 'IN') config.inNo++; else config.outNo++;
        
        // Prepare Print Slip with clean reverse date
        document.getElementById('pType').innerText = type === 'IN' ? "HOUSE ➔ NTM" : "NTM ➔ HOUSE";
        document.getElementById('pChallan').innerText = challanNo;
        document.getElementById('pDate').innerText = cleanDate.split('-').reverse().join('-');
        document.getElementById('pQty').innerText = qty;
        document.getElementById('pNote').innerText = note || "N/A";
        document.getElementById('printModal').style.display = 'flex';

        document.getElementById('officeNote').value = '';
        saveData();
    }

    function toggleEditMode() { isEditing = !isEditing; document.getElementById('mainLog').classList.toggle('editing-active', isEditing); document.getElementById('editBtn').innerText = isEditing ? "Exit Edit" : "Edit Mode"; }
    
    function editEntry(id) {
        const item = stockData.find(x => x.id === id); 
        const newQty = prompt(`New Qty:`, item.qty); 
        const newDate = prompt(`New Date:`, item.date);
        const newNote = prompt(`New Note:`, item.note || "");
        if (newQty !== null && newDate !== null) { 
            item.qty = parseInt(newQty) || 0; 
            item.date = newDate.split('T')[0]; // Ensure edited date is also clean
            item.note = newNote;
            saveData(); 
        }
    }

    function saveData() {
        stockData.sort((a, b) => new Date(b.date) - new Date(a.date));
        localStorage.setItem('msk_v13_data', JSON.stringify(stockData)); localStorage.setItem('msk_v13_config', JSON.stringify(config));
        document.getElementById('pcsInput').value = ''; updateUI(); syncToCloud();
    }

    async function syncToCloud() {
        if (!config.cloudUrl) return;
        const status = document.getElementById('syncStatus'); status.innerText = "⏳ Syncing...";
        
        // FIX 2: Ensure date is sent as a clean string YYYY-MM-DD
        const cloudExport = stockData.map(i => ({ 
            date: i.date.toString().split('T')[0], 
            challan: i.challan, 
            type: i.type, 
            qty: i.type === 'IN' ? i.qty : -i.qty,
            note: i.note || "" 
        }));
        cloudExport.push({ date: "INITIAL", challan: "OPENING", type: "BASE", qty: config.opening, note: "" });
        
        try {
            await fetch(config.cloudUrl, { 
                method: "POST", 
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({ action: "SYNC_STOCK", logs: cloudExport }) 
            });
            status.innerText = "✅ Cloud Synced: " + new Date().toLocaleTimeString();
        } catch (e) { status.innerText = "❌ Sync Failed"; }
    }

    async function recoverFromCloud() {
        if (!config.cloudUrl) return alert("Cloud URL not set.");
        const btn = document.querySelector('.recover-btn'); btn.innerText = "⏳ RECOVERING...";
        try {
            const response = await fetch(config.cloudUrl + "?action=GET_OFFICE");
            const json = await response.json();
            const data = json.logs;

            stockData = data.filter(i => i.challan !== "OPENING").map(i => ({
                id: Date.now() + Math.random(), 
                date: i.date.toString().split('T')[0], // Clean incoming date
                challan: i.challan, 
                type: parseFloat(i.qty) > 0 ? "IN" : "OUT", 
                qty: Math.abs(parseFloat(i.qty)),
                note: i.note || ""
            }));

            const openRow = data.find(i => i.challan === "OPENING");
            if (openRow) config.opening = parseFloat(openRow.qty);

            saveData(); btn.innerText = "✅ RECOVERY SUCCESS";
            setTimeout(() => btn.innerText = "⚠️ RECOVER FROM CLOUD", 2000);
        } catch (e) { console.error(e); btn.innerText = "❌ FAILED"; }
    }

    function render() {
        let balance = config.opening; const log = document.getElementById('mainLog'); log.innerHTML = '';
        const chrono = [...stockData].reverse(); chrono.forEach(i => balance += (i.type === 'IN' ? i.qty : -i.qty));
        document.getElementById('currentBalance').innerText = balance.toLocaleString('en-IN');
        
        stockData.slice(0, 10).forEach(i => {
            const div = document.createElement('div'); div.className = 'log-item';
            
            // FIX 3: Display date using the safe split method
            const cleanDate = i.date.toString().substring(0, 10).split('-').reverse().join('-');
            
            div.innerHTML = `<div><b>${i.challan}</b><br><small>${cleanDate} ${i.note ? ' - ' + i.note : ''}</small></div><div style="display:flex;align-items:center;"><div class="edit-controls"><span class="edit-link" onclick="editEntry(${i.id})">CORRECT</span></div><b style="color:${i.type==='IN'?'#27ae60':'#e74c3c'}">${i.type==='IN'?'+':'-'}${i.qty}</b></div>`;
            log.appendChild(div);
        });
    }

    window.onload = async () => {
        document.getElementById('manualDate').valueAsDate = new Date();
        if (config.cloudUrl) await recoverFromCloud(); else render();
    };
</script>
</body>
</html>
