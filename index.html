<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Muskan Fashion - Command Center</title>

    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ffc734">
    <link rel="apple-touch-icon" href="icon.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #F0EAE1; 
            --dark: #2c2e35; 
            --accent: #ffc734; 
            --green: #27ae60; 
        }
        /* Changed overflow:hidden to overflow-x:hidden to allow safe vertical scrolling on tiny phones */
        body, html { margin: 0; padding: 0; min-height: 100vh; background: var(--bg); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* HUB SCREEN: Updated to center content properly on all screens */
        #hub { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; box-sizing: border-box; transition: 0.5s; }
        
        /* LOGO: Now scales based on screen width */
        .logo-container { width: 95%; max-width: 450px; margin-bottom: 40px; }
        .logo-container svg { width: 100%; height: auto; }

        /* BUTTONS: Now stack vertically on mobile automatically */
        .btn-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; width: 100%; }
        
        .launch-btn {
            /* Width 100% for mobile, limited to 280px for larger screens */
            width: 100%; max-width: 280px; height: 180px; background: white; border: 2px solid var(--dark);
            border-radius: 12px; cursor: pointer; transition: 0.3s; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .launch-btn:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); border-color: var(--accent); }
        .launch-btn span { font-size: 16px; font-weight: 800; text-transform: uppercase; margin-top: 15px; color: var(--dark); }
        .stock-btn { border-bottom: 10px solid var(--green); }
        .mfg-btn { border-bottom: 10px solid var(--accent); }

        /* APP VIEWPORT: Full-screen display for sub-apps */
        #app-view { display: none; width: 100%; height: 100vh; position: fixed; top: 0; left: 0; z-index: 1000; background: white; }
        .nav-bar { 
            height: 50px; background: var(--dark); color: white; display: flex; 
            align-items: center; padding: 0 15px; justify-content: space-between;
        }
        .back-btn { background: #444; border: none; color: white; padding: 8px 15px; border-radius: 4px; font-weight: 800; cursor: pointer; font-size: 11px; }
        iframe { width: 100%; height: calc(100% - 50px); border: none; display: block; }
    </style>
</head>

    <div class="btn-grid">
        <button class="launch-btn stock-btn" onclick="openApp('STOCK')">
            <div style="font-size: 50px;">📦</div>
            <span>Office Stock</span>
        </button>
        <button class="launch-btn mfg-btn" onclick="openApp('MFG')">
            <div style="font-size: 50px;">🏭</div>
            <span>NTM Manufacturing</span>
        </button>
    </div>
</div>

<div id="app-view">
    <div class="nav-bar">
        <button class="back-btn" onclick="location.reload()">⬅ HUB</button>
        <span id="app-name" style="font-size: 11px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;"></span>
        <div style="width:100px;"></div>
    </div>
    <iframe id="app-frame"></iframe>
</div>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log("Muskan App Registered"));
    });
  }
function openApp(mode) {
        document.getElementById('hub').style.display = 'none';
        document.getElementById('app-view').style.display = 'block';
        document.getElementById('app-name').innerText = mode === 'STOCK' ? 'Office Stock Ledger' : 'NTM Manufacturing Unit';
        const frame = document.getElementById('app-frame');
        frame.src = mode === 'STOCK' ? 'Muskan_Office.html' : 'Muskan_Unit.html';
    }

</script>
